exclude_dirs:
  - tmp
  - audits
  - build
  - dist
  - stem_output
  - .manual_verify
  - .pytest_cache
  - .tmp_build_temp
  - .tmp_pycompile
  - .tmp_pytest
  - .tmp_pytest_run
  - __pycache__
  - "*.egg-info"

exclude_files:
  - "tmp/*"
  - "build/*"
  - "*/tmp/*"
  - "*/build/*"
  - "audits/*"
  - "*/audits/*"
  - "stem_output*/*"
  - "*/stem_output*/*"
  - ".manual_verify/*"
  - "*/.manual_verify/*"
