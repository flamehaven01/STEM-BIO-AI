[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "stem-ai"
version = "1.4.1"
description = "STEM BIO-AI deterministic evidence-surface scanner for bio/medical AI repositories"
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
authors = [
  { name = "Flamehaven" }
]
dependencies = []

[project.optional-dependencies]
pdf  = ["reportlab>=4.0"]
demo = ["gradio>=4.44.0,<6", "reportlab>=4.0"]

[project.scripts]
stem = "stem_ai.cli:main"

[project.urls]
Homepage = "https://github.com/flamehaven01/STEM-BIO-AI"
Issues = "https://github.com/flamehaven01/STEM-BIO-AI/issues"

[tool.setuptools.packages.find]
include = ["stem_ai*"]
