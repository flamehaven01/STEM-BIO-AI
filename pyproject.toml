[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "stem-ai"
version = "1.1.3"
description = "STEM BIO-AI trust audit framework for bio/medical AI repositories"
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
authors = [
  { name = "Flamehaven" }
]
dependencies = []

[project.optional-dependencies]
pdf  = ["reportlab>=4.0"]
demo = ["gradio==4.44.1", "huggingface_hub<1.0", "fastapi==0.115.0", "starlette==0.38.6", "pyaudioop; python_version >= '3.13'", "reportlab>=4.0"]

[project.scripts]
stem = "stem_ai.cli:main"

[project.urls]
Homepage = "https://github.com/flamehaven01/STEM-BIO-AI"
Issues = "https://github.com/flamehaven01/STEM-BIO-AI/issues"

[tool.setuptools.packages.find]
include = ["stem_ai*"]
